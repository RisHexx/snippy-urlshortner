version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend
    env_file:
      - .env
    restart: always

volumes:
  redis_data: